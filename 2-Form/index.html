<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <main>
      <div class="form-container">
        <div class="h1-item">
          <h1>Регистрация</h1>
        </div>
        <div class="question-item">
          <p>Уже есть аккаунт?</p>
          <a href="#">Войти</a>
        </div>
        <!-- <div class="inputs-item"> -->
        <form action="#" method="post" class="inputs-item">
          <div class="company-field">
            <label for="my-company" class="label-my-company"
              >Моя компания:</label
            >
            <input
              type="text"
              name="my-company"
              id="my-company"
              placeholder=""
              required
            />

          </div>
          <div class="name-fileds-container">
            <div>
              <input
                type="text"
                name="first-name"
                id="first-name"
                placeholder="Имя:"
                required
              />
            </div>
            <div>
              <input
                type="text"
                name="last-name"
                id="last-name"
                placeholder="Фамилия:"
                required
              />
            </div>
          </div>
          <div class="email-filed-container">
            <input
              type="email"
              name="email"
              id="email"
              placeholder="E-mail:"
              required
            />
          </div>
          <button>Зарегистрироваться</button>
          <div>
            <div>
              <input type="checkbox" name="agree" id="agree" required />
            </div>
            <label for="agree" class="im-agree">Я прочитал и принимаю</label>
            <a href="#">Условия использования</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
